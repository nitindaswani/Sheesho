{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Register | Sheesho</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{% static 'css/register.css' %}">
  </head>

  <body>
    <div class="register-card">
      <h3 class="text-center mb-4">
        Create Account on <span class="brand">Sheesho</span>
      </h3>

      <!-- MESSAGES (ERROR / SUCCESS) -->
      {% if messages %} {% for message in messages %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% endif %}

      <form method="POST">
        {% csrf_token %}

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input
            type="text"
            name="name"
            class="form-control"
            placeholder="Enter full name"
            required
          />
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter email"
            required
          />
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            name="password"
            class="form-control"
            pattern="^(?=.*[A-Za-z]).{8,}$"
            placeholder="Password must be at least 8 characters long and contain at least one letter"
            required
          />
        </div>

        <!-- Phone Number -->
        <div class="mb-3">
          <label class="form-label">Mobile Number</label>
          <input
            type="text"
            name="number"
            class="form-control"
            placeholder="10 digit mobile number"
            required
          />
        </div>

        <!-- Address -->
        <div class="mb-3">
          <label class="form-label">Address</label>
          <textarea
            name="address"
            class="form-control"
            rows="3"
            placeholder="Enter address"
            required
          ></textarea>
        </div>

        <!-- City -->
        <div class="mb-3">
          <label class="form-label">City</label>
          <input
            type="text"
            name="city"
            class="form-control"
            placeholder="Enter city"
            required
          />
        </div>

        <!-- State -->
        <div class="mb-3">
          <label class="form-label">State</label>
          <input
            type="text"
            name="state"
            class="form-control"
            placeholder="Enter state"
            required
          />
        </div>

        <!-- Pincode -->
        <div class="mb-3">
          <label class="form-label">Pincode</label>
          <input
            type="text"
            name="pincode"
            class="form-control"
            placeholder="Enter pincode"
            required
          />
        </div>

        <!-- Register Button -->
        <div class="d-grid">
          <button type="submit" class="btn btn-sheesho btn-lg">Register</button>
        </div>

        <!-- Login Redirect -->
        <p class="text-center mt-3">
          Already have an account?
          <a
            href="{% url 'login:login' %}"
            class="text-decoration-none"
            style="color: #e91e63"
          >
            Login
          </a>
        </p>
      </form>
    </div>

    <div class="footer">
      <h4>Contact us : XXXXX XXXXX</h4>
      <p>Email : support@sheesho.com</p>
      <p>Address : Sheesho Centre, Gurgaon</p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
