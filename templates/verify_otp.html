{% load static %}
<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Verify OTP | Sheesho</title>

		<!-- Bootstrap CSS -->
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
			rel="stylesheet"
		/>

		<link rel="stylesheet" href="{% static 'css/verify_otp.css' %}" />
	</head>

	<body>
		<a href="{% url 'register' %}" class="auth-back-btn">&larr; Back</a>

		<div class="verify-card">
			<h3 class="text-center mb-2">
				Verify Your <span class="brand">OTP</span>
			</h3>
			<p class="verify-subtitle text-center mb-4">
				We sent a 6-digit OTP to
				<span class="verify-email">{{ email }}</span>
			</p>

			{% if messages %}
			{% for message in messages %}
			<div class="alert alert-danger alert-dismissible fade show" role="alert">
				{{ message }}
				<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
			</div>
			{% endfor %}
			{% endif %}

			<form method="POST" autocomplete="off">
				{% csrf_token %}

				<div class="mb-3">
					<label class="form-label">Enter OTP</label>
					<input
						type="text"
						name="otp"
						inputmode="numeric"
						maxlength="6"
						pattern="[0-9]{6}"
						class="form-control otp-input"
						placeholder="Enter 6-digit OTP"
						required
					/>
				</div>

				<div class="d-grid">
					<button type="submit" class="btn btn-sheesho btn-lg">
						Verify & Continue
					</button>
				</div>
			</form>
		</div>

		{% include 'footer.html' %}

		<!-- Bootstrap JS -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
