{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Place Order | Sheesho</title>
    <link rel="stylesheet" href="{% static 'css/place_order.css' %}" />
  </head>
  <body>
    {%include 'header.html'%}

    <div class="order-wrapper">
      <!-- PRODUCT SUMMARY -->
      <div class="order-product">
        <img src="{{ product.pro_image.url }}" alt="{{ product.pro_name }}" />
        <div>
          <h2>{{ product.pro_name }}</h2>
          <p class="price">₹ {{ product.pro_price }}</p>
        </div>
      </div>

      <!-- ORDER FORM -->
      {% if loggedin %}
      <form method="POST" class="order-form">
        {% csrf_token %}

        <div class="field">
          <label>Name</label>
          <input type="text" name="name" value="{{user.name}}" required />
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" name="email" value="{{user.email}}" required />
        </div>

        <div class="field">
          <label>Phone</label>
          <input
            type="text"
            name="phone"
            required
            maxlength="10"
            pattern="[0-9]{10}"
            title="Enter a valid 10-digit phone number"
            inputmode="numeric"
            value="{{user.number}}"
          />
        </div>

        <div class="field">
          <label>Address</label>
          <input type="text" name="address" value="{{user.address}}" required />
        </div>

        <div class="field-row">
          <div class="field">
            <label>City</label>
            <input type="text" name="city" value="{{user.city}}" required />
          </div>

          <div class="field">
            <label>State</label>
            <input type="text" name="state" value="{{user.state}}" required />
          </div>
        </div>

        <div class="field">
          <label>ZIP Code</label>
          <input
            type="text"
            name="zip_code"
            value="{{user.pincode }}"
            required
          />
        </div>

        <button type="submit" class="place-btn">Place Order</button>
      </form>
      {% else %}
      <div class="login-required-box">
        <p>You must be logged in to place an order.</p>
        <a href="/login/?next={{ request.path }}" class="login-required-btn">
          Login to Continue
        </a>
      </div>
      {% endif %}
    </div>

    {%include 'footer.html'%}
  </body>
</html>
