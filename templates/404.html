{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>404 | Page Not Found - Sheesho</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
        margin: 0;
      }

      body {
        background: #f8f9fa;
      }

      /* Wrapper */
      .sheesho-404-wrapper {
        min-height: calc(100vh - 260px); /* header + footer safe space */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
      }

      /* Card */
      .sheesho-404-card {
        background: #ffffff;
        padding: 60px 55px;
        max-width: 540px;
        width: 100%;
        border-radius: 18px;
        text-align: center;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        animation: slideUp 0.7s ease;
      }

      /* 404 */
      .sheesho-404-card h1 {
        font-size: 110px;
        font-weight: 800;
        color: #d63384;
        margin-bottom: 10px;
      }

      /* Heading */
      .sheesho-404-card h2 {
        font-size: 28px;
        color: #222;
        margin-bottom: 14px;
      }

      /* Text */
      .sheesho-404-card p {
        font-size: 15px;
        color: #666;
        line-height: 1.7;
        margin-bottom: 36px;
      }

      /* Buttons */
      .btn-group {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn-primary {
        padding: 14px 34px;
        background: #d63384;
        color: #fff;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s ease;
        box-shadow: 0 10px 25px rgba(214, 51, 132, 0.35);
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 32px rgba(214, 51, 132, 0.45);
      }

      

      /* Animation */
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 480px) {
        .sheesho-404-card {
          padding: 45px 25px;
        }

        .sheesho-404-card h1 {
          font-size: 85px;
        }

        .sheesho-404-card h2 {
          font-size: 22px;
        }
      }
    </style>
  </head>
  <body>
    {%include 'header.html'%}

    <div class="sheesho-404-wrapper">
      <div class="sheesho-404-card">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>
          Looks like the page you’re searching for doesn’t exist or was moved.
          Let’s get you back to shopping on <strong style="color: #d63384;">Sheesho</strong>.
        </p>

        <div class="btn-group">
          <a href="/" class="btn-primary">Go to Home</a>
          
        </div>
      </div>
    </div>

    {%include 'footer.html'%}
  </body>
</html>
